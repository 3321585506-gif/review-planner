<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今天你鼠了吗？</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="./assets/logo.gif" alt="今日标志">
      <div>
        <h1>今天你鼠了吗？</h1>
        <p>先考的冲在前面，后考的提前铺开，简单课不抢跑。</p>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main>
    <section class="hero-card">
      <div>
        <h2>今日复习摊位</h2>
        <p id="todayLabel"></p>
      </div>
      <div class="actions">
        <button id="resetBtn" class="danger">重置计划</button>
        <button id="pullBtn">提前完成：拉下一项</button>
      </div>
    </section>

    <section class="today-grid" id="todayTasks"></section>

    <nav class="tabs">
      <button class="tab active" data-tab="overview">日历总览</button>
      <button class="tab" data-tab="exams">考试时间</button>
      <button class="tab" data-tab="subjects">科目进度</button>
    </nav>

    <section id="overview" class="tabpage active">
      <div id="calendar" class="calendar"></div>
    </section>

    <section id="exams" class="tabpage">
      <div id="examList" class="exam-list"></div>
    </section>

    <section id="subjects" class="tabpage">
      <div id="subjectList" class="subject-list"></div>
    </section>
  </main>

  <template id="taskTemplate">
    <article class="task-card">
      <label class="checkline">
        <input type="checkbox">
        <span class="task-title"></span>
      </label>
      <p class="task-meta"></p>
      <div class="task-actions">
        <button class="delay">延后</button>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
